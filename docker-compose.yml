services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-prod
    ports:
      - "3069:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portal-network

networks:
  portal-network:
    driver: bridge