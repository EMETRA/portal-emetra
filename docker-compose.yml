services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-prod
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
    env_file:
      - path: .env
        required: false
      - path: .env.production
        required: false
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portal-network

networks:
  portal-network:
    driver: bridge
